apiVersion: v1
kind: Namespace
metadata:
  name: argocd-demo-manual
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: argocd-demo-manual
data:
  ENVIRONMENT: "demo-manual"
  APP_VERSION: "1.0.0"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backend
  namespace: argocd-demo-manual
spec:
  serviceName: backend
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
    spec:
      containers:
      - name: backend
        image: argocd-demo-backend:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: argocd-demo-manual
  labels:
    app: backend
spec:
  clusterIP: None
  selector:
    app: backend
  ports:
  - port: 3001
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: backend-public
  namespace: argocd-demo-manual
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - port: 3001
    targetPort: 3001
    name: http
