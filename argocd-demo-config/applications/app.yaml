apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-demo-app-manual
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/muzzylogic/argocd-demo-app
    targetRevision: main
    path: argocd-demo-app/k8s-manual

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-demo-manual

  syncPolicy:
    syncOptions:
    - CreateNamespace=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-demo-app-auto-sync
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/muzzylogic/argocd-demo-app
    targetRevision: main
    path: argocd-demo-app/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-demo

  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    
    # AUTO SYNC ENABLED - demonstrates automatic GitOps
    automated:
      prune: true        # Delete resources removed from git
      selfHeal: true     # Reconcile if cluster state drifts
      allowEmpty: false  # Prevent deleting all resources

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
